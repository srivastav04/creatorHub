version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # Exposed to host so you can connect from outside if needed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # pgAdmin - GUI for Postgres
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ─────────────────────────────────────────
  # Express backend  (hot-reload via nodemon)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST so the backend always resolves to the compose service
      DB_HOST: postgres
    volumes:
      # Mount the source code as a volume so nodemon picks up changes
      # without rebuilding the image.
      - ./backend:/app
      # Prevent the host node_modules from shadowing the container's
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  pgdata:
